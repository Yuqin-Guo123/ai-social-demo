<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>对局阶段 · AI语音社交助手</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: "Hiragino Sans GB", "Heiti SC", "Microsoft YaHei", sans-serif;
      background: #000;
    }

    .battle-screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-image: url("./images/对局背景.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    /* AI助手：右上角固定 */
    .battle-screen .ai-button {
      position: absolute;
      right: 34px;
      top: 92px;
      left: auto;
      bottom: auto;
      width: 82px;
      height: 82px;
      border: none;
      background: transparent;
      cursor: pointer;
      z-index: 80;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .battle-screen .ai-button img {
      width: 78px;
      height: 78px;
      object-fit: contain;
      position: relative;
      z-index: 2;
      animation: aiFloat 2s ease-in-out infinite;
    }

    .battle-screen .ai-wave {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 2px solid rgba(190, 205, 255, 0.85);
      animation: wavePulse 2s infinite;
    }

    @keyframes wavePulse {
      0% { transform: scale(1); opacity: 0.9; }
      70% { transform: scale(1.55); opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes aiFloat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* 右侧展开箭头 */
    .chat-toggle {
      position: absolute;
      right: 0;
      top: 185px;
      width: 38px;
      height: 78px;
      border: 1px solid rgba(255,255,255,0.4);
      border-right: none;
      border-radius: 18px 0 0 18px;
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(12px);
      color: white;
      font-size: 34px;
      font-weight: bold;
      cursor: pointer;
      z-index: 75;
    }

    /* 队伍频道：默认藏在右侧 */
    .team-chat {
      position: absolute;
      right: 24px;
      top: 150px;
      width: 390px;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.32);
      backdrop-filter: blur(14px);
      color: #fff;
      text-shadow: 0 1px 5px rgba(0,0,0,0.35);
      z-index: 70;
      transform: translateX(440px);
      transition: transform 0.35s ease;
    }

    .team-chat.show {
      transform: translateX(0);
    }

    .team-chat-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .chat-close {
      border: none;
      background: transparent;
      color: white;
      font-size: 26px;
      cursor: pointer;
    }

    .chat-line {
      margin: 8px 0;
      font-size: 14px;
      line-height: 1.45;
    }

    .ai-input-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.24);
    }

    .ai-input-title {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .voice-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .battle-voice-btn {
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.18);
      color: white;
      cursor: pointer;
      font-size: 13px;
      backdrop-filter: blur(8px);
    }

    .generated-message {
      display: none;
      margin-top: 10px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.28);
      line-height: 1.45;
      font-size: 14px;
    }

    .generated-message.show {
      display: block;
    }

    .send-btn {
      display: none;
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(
        135deg,
        rgba(255,220,240,0.48),
        rgba(210,220,255,0.35)
      );
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.4);
    }

    .send-btn.show {
      display: block;
    }

    .toast {
      position: absolute;
      left: 50%;
      top: 45%;
      transform: translate(-50%, -50%);
      padding: 16px 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.35);
      color: white;
      font-size: 22px;
      font-weight: bold;
      text-shadow: 0 1px 5px rgba(0,0,0,0.35);
      z-index: 100;
      animation: pop 1.2s ease forwards;
    }

    .hidden {
      display: none;
    }

    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
      20% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }
  </style>
</head>

<body>
  <main class="battle-screen">

    <!-- AI小助手：一直显示 -->
    <button class="ai-button" id="assistantBtn">
      <span class="ai-wave"></span>
      <img src="images/ai助手icon.png" alt="AI助手" />
    </button>

    <!-- 右侧箭头 -->
    <button class="chat-toggle" id="chatToggle">‹</button>

    <!-- 队伍频道 -->
    <section class="team-chat" id="teamChat">
      <div class="team-chat-title">
        队伍频道
        <button class="chat-close" id="chatClose">×</button>
      </div>

      <p class="chat-line">雨果：中路压力有点大。</p>
      <p class="chat-line">夏日畅想家：我马上来支援。</p>
      <p class="chat-line" id="sentMessage">AI优化后的消息将在这里显示。</p>

      <div class="ai-input-box">
        <p class="ai-input-title">对 AI 小助手说：</p>

        <div class="voice-options">
          <button class="battle-voice-btn" data-action="soften">🎙 干嘛啊你别送了！</button>
          <button class="battle-voice-btn" data-action="tactic">🎙 凭什么不来中路？</button>
          <button class="battle-voice-btn" data-action="thanks">🎙 谢谢</button>
        </div>

        <div class="generated-message" id="generatedMessage"></div>
        <button class="send-btn" id="sendBtn">确认发送</button>
      </div>
    </section>

    <div class="toast hidden" id="toast">已发送</div>
  </main>

  <script>
    const teamChat = document.getElementById("teamChat");
    const chatToggle = document.getElementById("chatToggle");
    const chatClose = document.getElementById("chatClose");
    const assistantBtn = document.getElementById("assistantBtn");

    const generatedMessage = document.getElementById("generatedMessage");
    const sendBtn = document.getElementById("sendBtn");
    const sentMessage = document.getElementById("sentMessage");
    const toast = document.getElementById("toast");

    let finalText = "";

    function openChat() {
      teamChat.classList.add("show");
    }

    function closeChat() {
      teamChat.classList.remove("show");
    }

    assistantBtn.addEventListener("click", openChat);
    chatToggle.addEventListener("click", openChat);
    chatClose.addEventListener("click", closeChat);

    document.querySelectorAll(".battle-voice-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const action = btn.dataset.action;

        if (action === "soften") {
          finalText = "这波我们先稳一下，我来支援你。";
          generatedMessage.innerHTML = `
            <b>AI优化：</b>“${finalText}”<br>
            <span>已降低冲突语气，保留战术提醒。</span>
          `;
        }

        if (action === "tactic") {
          finalText = "敌方中路压线过深，建议集合中路打一波。";
          generatedMessage.innerHTML = `
            <b>AI优化：</b>“${finalText}”<br>
            <span>已将模糊语音转为结构化战术信息。</span>
          `;
        }

        if (action === "thanks") {
          finalText = "刚刚那波支援太关键了，多亏你救场！";
          generatedMessage.innerHTML = `
            <b>AI优化：</b>“${finalText}”<br>
            <span>已增强感谢语气，提升正向互动。</span>
          `;
        }

        generatedMessage.classList.add("show");
        sendBtn.classList.add("show");
      });
    });

    sendBtn.addEventListener("click", () => {
      sentMessage.textContent = "雨果：" + finalText;

      toast.textContent = "💬 已发送到队伍频道";
      toast.classList.remove("hidden");
      toast.style.animation = "none";

      setTimeout(() => {
        toast.style.animation = "pop 1.2s ease forwards";
      }, 20);

      setTimeout(() => {
        toast.classList.add("hidden");
      }, 1200);
    });
  </script>
</body>
</html>

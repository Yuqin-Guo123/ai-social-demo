<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>对局阶段 · AI语音社交助手</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    .battle-screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-image: url("./images/对局背景.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    .battle-screen .ai-button {
      right: 24px;
      top: 92px;
      left: auto;
      bottom: auto;
      width: 90px;
      height: 90px;
    }

    .battle-screen .ai-button img {
      width: 88px;
      height: 88px;
    }

    .battle-screen .ai-wave {
      width: 82px;
      height: 82px;
    }

    .team-chat {
      position: absolute;
      left: 32px;
      bottom: 34px;
      width: 500px;
      padding: 16px;
      border-radius: 22px;

      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.28);
      backdrop-filter: blur(12px);

      color: #fff;
      text-shadow: 0 1px 5px rgba(0,0,0,0.35);
      z-index: 10;
    }

    .team-chat-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .chat-line {
      margin: 8px 0;
      font-size: 15px;
    }

    .ai-input-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.22);
    }

    .ai-input-title {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 700;
      opacity: 0.95;
    }

    .voice-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .battle-voice-btn {
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.18);
      color: white;
      cursor: pointer;
      font-size: 13px;
      backdrop-filter: blur(8px);
    }

    .generated-message {
      display: none;
      margin-top: 10px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.28);
      line-height: 1.45;
      font-size: 14px;
    }

    .generated-message.show {
      display: block;
    }

    .send-btn {
      display: none;
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(
        135deg,
        rgba(255,220,240,0.48),
        rgba(210,220,255,0.35)
      );
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.4);
    }

    .send-btn.show {
      display: block;
    }

    .toast {
      color: #fff;
    }
  </style>
</head>

<body>
  <main class="battle-screen">

    <button class="chat-toggle" id="chatToggle">›</button>

<section class="team-chat" id="teamChat">
  <div class="team-chat-title">
    队伍频道
    <button class="chat-close" id="chatClose">‹</button>
  </div>

  <p class="chat-line">雨果：中路压力有点大。</p>
  <p class="chat-line">夏日畅想家：我马上来支援。</p>
  <p class="chat-line" id="sentMessage">AI优化后的消息将在这里显示。</p>

  <div class="ai-input-box">
    <p class="ai-input-title">对 AI 小助手说：</p>

    <div class="voice-options">
      <button class="battle-voice-btn" data-action="soften">🎙 你别送了</button>
      <button class="battle-voice-btn" data-action="tactic">🎙 中路来一下</button>
      <button class="battle-voice-btn" data-action="thanks">🎙 刚刚多亏你</button>
    </div>

    <div class="generated-message" id="generatedMessage"></div>
    <button class="send-btn" id="sendBtn">确认发送</button>
  </div>
</section>

    <div class="toast hidden" id="toast">已发送</div>
  </main>

  <script>
    const generatedMessage = document.getElementById("generatedMessage");
    const sendBtn = document.getElementById("sendBtn");
    const sentMessage = document.getElementById("sentMessage");
    const toast = document.getElementById("toast");

    let finalText = "";

    document.querySelectorAll(".battle-voice-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const action = btn.dataset.action;

        if (action === "soften") {
          finalText = "这波我们先稳一下，我来支援你。";
          generatedMessage.innerHTML = `
            <b>AI优化：</b>“${finalText}”<br>
            <span>已降低冲突语气，保留战术提醒。</span>
          `;
        }

        if (action === "tactic") {
          finalText = "敌方中路压线过深，建议集合中路打一波。";
          generatedMessage.innerHTML = `
            <b>AI优化：</b>“${finalText}”<br>
            <span>已将模糊语音转为结构化战术信息。</span>
          `;
        }

        if (action === "thanks") {
          finalText = "刚刚那波支援太关键了，多亏你救场！";
          generatedMessage.innerHTML = `
            <b>AI优化：</b>“${finalText}”<br>
            <span>已增强感谢语气，提升正向互动。</span>
          `;
        }

        generatedMessage.classList.add("show");
        sendBtn.classList.add("show");
      });
    });

    sendBtn.addEventListener("click", () => {
      sentMessage.textContent = "雨果：" + finalText;

      toast.textContent = "💬 已发送到队伍频道";
      toast.classList.remove("hidden");
      toast.style.animation = "none";

      setTimeout(() => {
        toast.style.animation = "pop 1.2s ease forwards";
      }, 20);

      setTimeout(() => {
        toast.classList.add("hidden");
      }, 1200);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI语音社交助手 Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <main class="game-screen">

      <!-- 顶部状态栏 -->
      <img class="avatar-frame" src="images/头像框icon.png" alt="">
      <img class="avatar" src="images/头像.jpg" alt="">
      <span class="player-name">雨果<br><small>LV.50</small></span>

      <img class="coin top-icon" src="images/金币icon.png" alt="">
      <img class="exp top-icon" src="images/经验icon.png" alt="">
      <img class="ticket top-icon" src="images/点券icon.png" alt="">
      <img class="mail top-icon" src="images/信件icon.png" alt="">
      <img class="setting top-icon" src="images/设置icon.png" alt="">

      <!-- 左侧功能 -->
      <img class="shop" src="images/商店icon.png" alt="">
      <img class="hero" src="images/英雄icon.png" alt="">
      <img class="side-bar" src="images/边栏icon.png" alt="">

      <!-- 中间按钮 -->
      <img class="custom" src="images/自定义icon.png" alt="">
      <img class="rank" src="images/排位赛icon.png" alt="">
      <img class="training" src="images/训练赛icon.png" alt="">
      <img class="match" src="images/匹配赛icon.png" alt="">
      <img class="season" src="images/赛季之旅icon.png" alt="">

      <!-- 玩家 -->
      <div class="character c1">
        <span>咩咩羊</span>
        <img src="images/玩家5.png" alt="">
      </div>

      <div class="character c2">
        <span>雨果</span>
        <img src="images/玩家2.png" alt="">
      </div>

      <div class="character c3">
        <span>魔丸、来啦</span>
        <img src="images/玩家1.png" alt="">
      </div>

      <div class="character c4">
        <span>夏日畅想家</span>
        <img src="images/玩家3.png" alt="">
      </div>

      <div class="character c5">
        <span>小鹿喝奶茶</span>
        <img src="images/玩家6.png" alt="">
      </div>

      <!-- AI助手入口 -->
      <button class="ai-button" id="openAI">
        <span class="ai-wave"></span>
        <img src="images/ai助手icon.png" alt="AI助手" />
      </button>

      <!-- AI面板 -->
      <section class="ai-panel" id="aiPanel">
        <div class="panel-header">
          <h2>AI语音社交助手</h2>
          <button id="closeAI">×</button>
        </div>

        <div class="scene-card">
          <p class="label">当前场景</p>
          <p>大厅阶段 · 匹配前</p>
        </div>

        <button class="voice-btn" id="voiceBtn">🎙 模拟语音：给夏日畅想家送一朵花</button>

        <div class="ai-card hidden" id="aiResult">
          <p class="label">AI识别结果</p>
          <p><b>对象：</b>夏日畅想家</p>
          <p><b>行为：</b>赠送礼物</p>
          <p><b>礼物：</b>鲜花 × 1</p>
          <button class="confirm-btn" id="confirmBtn">确认送礼</button>
        </div>

        <div class="success-card hidden" id="successResult">
          ✅ 已向「夏日畅想家」赠送鲜花，好感度 +5
        </div>
      </section>

      <div class="toast hidden" id="toast">🌸 送礼成功！</div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>

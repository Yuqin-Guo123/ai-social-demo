<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI语音社交助手 Demo</title>
<link rel="stylesheet" href="style.css?v=14" />
</head>
<body>
  <div class="page">
    <main class="game-screen">

      <button class="ai-button" id="openAI">
        <span class="ai-wave"></span>
        <img src="images/ai助手icon.png" alt="AI助手" />
      </button>

      <section class="ai-panel" id="aiPanel">
        <div class="panel-header">
          <h2>AI语音社交助手</h2>
          <button id="closeAI">×</button>
        </div>

       <div class="listen-card">
  <p class="label">AI识别语音</p>
  <p class="voice-text">“帮我推荐匹配玩家”</p>
</div>

<p class="recommend-intro">已为您推荐了互补匹配的玩家</p>

<div class="namecard">
  <img src="images/夏日名片.png" alt="夏日畅想家名片">
</div>

<p class="hint">试试说：</p>

<div class="voice-group">
  <button class="voice-btn" data-action="gift">🎙 给他送十朵鲜花</button>
  <button class="voice-btn" data-action="hello">🎙 跟他打个招呼</button>
  <button class="voice-btn" data-action="match">🎙 邀请他一起匹配</button>
</div>

<div class="ai-card hidden" id="aiResult">
  <p class="label">AI识别结果</p>
  <div id="aiContent"></div>
  <button class="confirm-btn" id="confirmBtn">确认执行</button>
</div>

        <div class="success-card hidden" id="successResult">
          ✅ 已向「夏日畅想家」赠送鲜花，好感度 +5
        </div>
      </section>

      <div class="toast hidden" id="toast">🌸 送礼成功！</div>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
